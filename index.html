<body>
  <div id="root"></div>

  <!-- Our Magical React Robot Code -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useMemo } = React;
    const { motion, AnimatePresence, useScroll, useTransform, useInView } = window.Motion;

    // --- SVG ICONS (Replacing Lucide Imports) ---
    const MenuIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
    const XIcon = ({size=32, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ArrowRightIcon = ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const CheckIcon = ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M20 6 9 17l-5-5"/></svg>;
    const PlusIcon = ({className=""}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const PlayIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>;
    const MessageCircleIcon = ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const ExternalLinkIcon = ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;

    // --- BACKGROUND SYSTEM (OGL & Canvas) ---

    const useOGL = () => {
      const [ogl, setOgl] = useState(null);
      useEffect(() => {
        if (window.ogl) {
          setOgl(window.ogl);
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/ogl@0.0.116/dist/ogl.umd.js';
        script.async = true;
        script.onload = () => {
          setOgl(window.ogl);
        };
        document.head.appendChild(script);
        return () => {};
      }, []);
      return ogl;
    };

    const Iridescence = ({ color = [0.78, 0, 0.04] }) => { 
      const containerRef = useRef(null);
      const ogl = useOGL();

      useEffect(() => {
        if (!ogl || !containerRef.current) return;

        const { Renderer, Program, Mesh, Color, Triangle } = ogl;
        const el = containerRef.current;
        
        if (el.querySelector('canvas')) return;

        const renderer = new Renderer({ alpha: true, premultipliedAlpha: false });
        const gl = renderer.gl;

        const vertex = `
          attribute vec2 uv;
          attribute vec2 position;
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = vec4(position, 0, 1);
          }
        `;

        const fragment = `
          precision highp float;
          uniform float uTime;
          uniform vec3 uColor;
          uniform vec3 uResolution;
          uniform vec2 uMouse;
          uniform float uAmplitude;
          uniform float uSpeed;
          varying vec2 vUv;
          void main() {
            float mr = min(uResolution.x, uResolution.y);
            vec2 uv = (vUv.xy * 2.0 - 1.0) * uResolution.xy / mr;
            uv += (uMouse - vec2(0.5)) * uAmplitude;
            float d = -uTime * 0.5 * uSpeed;
            float a = 0.0;
            for (float i = 0.0; i < 8.0; ++i) {
              a += cos(i - d - a * uv.x);
              d += sin(uv.y * i + a);
            }
            d += uTime * 0.5 * uSpeed;
            vec3 col = vec3(
              cos(uv * vec2(d, a)) * 0.6 + 0.4,
              cos(a + d) * 0.5 + 0.5
            );
            col = cos(col * cos(vec3(d, a, 2.5)) * 0.5 + 0.5) * uColor;
            gl_FragColor = vec4(col, 1.0);
          }
        `;

        const geometry = new Triangle(gl);
        const program = new Program(gl, {
          vertex,
          fragment,
          uniforms: {
            uTime: { value: 0 },
            uColor: { value: new Color(...color) },
            uResolution: { value: [1, 1, 1] }, 
            uMouse: { value: [0.5, 0.5] },
            uAmplitude: { value: 0.05 },
            uSpeed: { value: 0.4 }
          }
        });

        const mesh = new Mesh(gl, { geometry, program });

        const resize = () => {
          if (!el || !gl.canvas) return;
          const width = el.offsetWidth;
          const height = el.offsetHeight;
          renderer.setSize(width, height);
          program.uniforms.uResolution.value = [
            gl.canvas.width,
            gl.canvas.height,
            gl.canvas.width / gl.canvas.height
          ];
        };

        window.addEventListener('resize', resize);
        resize();

        let animationId;
        const loop = (t) => {
          animationId = requestAnimationFrame(loop);
          program.uniforms.uTime.value = t * 0.001;
          renderer.render({ scene: mesh });
        };
        animationId = requestAnimationFrame(loop);

        el.appendChild(gl.canvas);

        return () => {
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(animationId);
          if (el && gl.canvas.parentElement) el.removeChild(gl.canvas);
        };
      }, [ogl, color]);

      return <div ref={containerRef} className="absolute inset-0 w-full h-full" />;
    };

    const Antigravity = ({
      count = 300,
      magnetRadius = 6,
      ringRadius = 7,
      waveSpeed = 0.4,
      waveAmplitude = 1,
      particleSize = 1.5,
      lerpSpeed = 0.05,
      color = '#C8000A',
      autoAnimate = true,
      particleVariance = 1,
      rotationSpeed = 0,
      depthFactor = 1,
      pulseSpeed = 3,
      fieldStrength = 10
    }) => {
      const containerRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current || !window.THREE) return;

        const container = containerRef.current;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(0.2, 16, 16);
        const material = new THREE.MeshBasicMaterial({ color });
        const instancedMesh = new THREE.InstancedMesh(geometry, material, count);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        const dummy = new THREE.Object3D();
        const clock = new THREE.Clock();

        const getViewport = () => {
          const distance = camera.position.z;
          const vFov = (camera.fov * Math.PI) / 180;
          const height = 2 * Math.tan(vFov / 2) * distance;
          const width = height * camera.aspect;
          return { width, height };
        };

        let viewport = getViewport();

        const particles = [];
        for (let i = 0; i < count; i++) {
          const t = Math.random() * 100;
          const factor = 20 + Math.random() * 100;
          const speed = 0.01 + Math.random() / 200;
          const x = (Math.random() - 0.5) * viewport.width;
          const y = (Math.random() - 0.5) * viewport.height;
          const z = (Math.random() - 0.5) * 20;
          const randomRadiusOffset = (Math.random() - 0.5) * 2;

          particles.push({ t, factor, speed, mx: x, my: y, mz: z, cx: x, cy: y, cz: z, randomRadiusOffset });
        }

        const mouse = { x: 0, y: 0 };
        const lastMousePos = { x: 0, y: 0 };
        let lastMouseMoveTime = 0;
        const virtualMouse = { x: 0, y: 0 };

        const handleMouseMove = (e) => {
          const rect = container.getBoundingClientRect();
          mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
          
          const mouseDist = Math.sqrt(Math.pow(mouse.x - lastMousePos.x, 2) + Math.pow(mouse.y - lastMousePos.y, 2));
          if (mouseDist > 0.001) {
            lastMouseMoveTime = Date.now();
            lastMousePos.x = mouse.x;
            lastMousePos.y = mouse.y;
          }
        };
        window.addEventListener('mousemove', handleMouseMove);

        const handleResize = () => {
          if (!container) return;
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
          viewport = getViewport();
        };
        window.addEventListener('resize', handleResize);

        let animationId;
        const animate = () => {
          animationId = requestAnimationFrame(animate);
          
          let destX = (mouse.x * viewport.width) / 2;
          let destY = (mouse.y * viewport.height) / 2;

          if (autoAnimate && Date.now() - lastMouseMoveTime > 2000) {
            const time = clock.getElapsedTime();
            destX = Math.sin(time * 0.5) * (viewport.width / 4);
            destY = Math.cos(time * 0.5 * 2) * (viewport.height / 4);
          }

          const smoothFactor = 0.05;
          virtualMouse.x += (destX - virtualMouse.x) * smoothFactor;
          virtualMouse.y += (destY - virtualMouse.y) * smoothFactor;

          const targetX = virtualMouse.x;
          const targetY = virtualMouse.y;
          const globalRotation = clock.getElapsedTime() * rotationSpeed;

          particles.forEach((particle, i) => {
            let { t, speed, mx, my, mz, cz, randomRadiusOffset } = particle;
            t = particle.t += speed / 2;

            const projectionFactor = 1 - cz / 50;
            const projectedTargetX = targetX * projectionFactor;
            const projectedTargetY = targetY * projectionFactor;

            const dx = mx - projectedTargetX;
            const dy = my - projectedTargetY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            let targetPos = { x: mx, y: my, z: mz * depthFactor };

            if (dist < magnetRadius) {
              const angle = Math.atan2(dy, dx) + globalRotation;
              const wave = Math.sin(t * waveSpeed + angle) * (0.5 * waveAmplitude);
              const deviation = randomRadiusOffset * (5 / (fieldStrength + 0.1));
              const currentRingRadius = ringRadius + wave + deviation;

              targetPos.x = projectedTargetX + currentRingRadius * Math.cos(angle);
              targetPos.y = projectedTargetY + currentRingRadius * Math.sin(angle);
              targetPos.z = mz * depthFactor + Math.sin(t) * (1 * waveAmplitude * depthFactor);
            }

            particle.cx += (targetPos.x - particle.cx) * lerpSpeed;
            particle.cy += (targetPos.y - particle.cy) * lerpSpeed;
            particle.cz += (targetPos.z - particle.cz) * lerpSpeed;

            dummy.position.set(particle.cx, particle.cy, particle.cz);
            dummy.lookAt(projectedTargetX, projectedTargetY, particle.cz);
            dummy.rotateX(Math.PI / 2);

            const currentDistToMouse = Math.sqrt(
              Math.pow(particle.cx - projectedTargetX, 2) + Math.pow(particle.cy - projectedTargetY, 2)
            );

            const distFromRing = Math.abs(currentDistToMouse - ringRadius);
            let scaleFactor = 1 - distFromRing / 10;
            scaleFactor = Math.max(0, Math.min(1, scaleFactor));
            
            const finalScale = scaleFactor * (0.8 + Math.sin(t * pulseSpeed) * 0.2 * particleVariance) * particleSize;
            dummy.scale.set(finalScale, finalScale, finalScale);
            dummy.updateMatrix();

            instancedMesh.setMatrixAt(i, dummy.matrix);
          });

          instancedMesh.instanceMatrix.needsUpdate = true;
          renderer.render(scene, camera);
        };

        animate();

        return () => {
          window.removeEventListener('resize', handleResize);
          window.removeEventListener('mousemove', handleMouseMove);
          cancelAnimationFrame(animationId);
          if (container && renderer.domElement) {
            container.removeChild(renderer.domElement);
          }
          geometry.dispose();
          material.dispose();
          renderer.dispose();
        };
      }, [count, magnetRadius, ringRadius, waveSpeed, waveAmplitude, particleSize, lerpSpeed, color, autoAnimate, particleVariance, rotationSpeed, depthFactor, pulseSpeed, fieldStrength]);

      return <div ref={containerRef} className="absolute inset-0 w-full h-full" />;
    };

    const BackgroundSystem = () => (
      <div className="pointer-events-none fixed inset-0 -z-20 overflow-hidden">
        <div className="absolute inset-0 opacity-40">
          <Iridescence />
        </div>
        <div className="absolute inset-0 opacity-50">
          <Antigravity />
        </div>
        <div className="absolute inset-0 backdrop-blur-[80px]"></div>
        <div className="absolute inset-0 bg-gradient-to-b from-white/90 via-white/70 to-white/95"></div>
      </div>
    );

    // --- SHARED COMPONENTS ---

    const SectionLabel = ({ text, light = false }) => (
      <motion.div 
        initial={{ opacity: 0, x: -20 }}
        whileInView={{ opacity: 1, x: 0 }}
        viewport={{ once: true }}
        className={`flex items-center gap-3 font-mono text-[10px] tracking-[0.22em] uppercase ${light ? 'text-white/50' : 'text-[#C8000A]'}`}
      >
        <div className={`w-7 h-[1px] ${light ? 'bg-white/30' : 'bg-[#C8000A]'}`}></div>
        {text}
      </motion.div>
    );

    const CountUp = ({ end, suffix = "", duration = 2.5 }) => {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, margin: "-50px" });

      useEffect(() => {
        if (!isInView) return;

        const endValue = parseInt(end.replace(/,/g, ''));
        if (isNaN(endValue)) return;

        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / (duration * 1000), 1);
          const easeOut = 1 - Math.pow(1 - progress, 4); // Smooth deceleration
          
          setCount(Math.floor(easeOut * endValue));
          
          if (progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            setCount(endValue);
          }
        };
        
        window.requestAnimationFrame(step);
      }, [end, duration, isInView]);

      return <span ref={ref}>{count.toLocaleString('en-IN')}{suffix}</span>;
    };

    // --- TV NEWS TICKER COMPONENT ---

    const NewsTicker = () => {
      const stats = [
        { label: 'YEARS OF IMPLEMENTATION', val: '21+' },
        { label: 'BUSINESSES HAND-HELD', val: '1,500+' },
        { label: 'INDUSTRIES SERVED', val: '200+' },
        { label: 'PROJECTS IMPLEMENTED', val: '5,100+' },
        { label: 'INDIVIDUALS TRAINED', val: '20,000+' }
      ];

      const TickerContent = () => (
        <div className="flex items-center shrink-0">
          {stats.map((stat, i) => (
            <React.Fragment key={i}>
              <div className="flex items-center gap-4 px-10">
                <span className="font-serif text-3xl text-white font-medium">{stat.val}</span>
                <span className="font-mono text-[11px] tracking-widest text-white/50 uppercase">{stat.label}</span>
              </div>
              <div className="w-1.5 h-1.5 rounded-full bg-[#C8000A] shrink-0" />
            </React.Fragment>
          ))}
          <div className="flex items-center px-10">
            <span className="font-serif text-2xl text-[#C8000A] italic font-semibold">#NoGyaanOnlyGain</span>
          </div>
          <div className="w-1.5 h-1.5 rounded-full bg-[#C8000A] shrink-0" />
        </div>
      );

      return (
        <div className="bg-[#080808] py-5 overflow-hidden flex border-y border-white/10 relative">
          <motion.div 
            className="flex whitespace-nowrap"
            animate={{ x: ["0%", "-50%"] }}
            transition={{ repeat: Infinity, ease: "linear", duration: 35 }}
          >
            <TickerContent />
            <TickerContent />
          </motion.div>
        </div>
      );
    };

    // --- IKIGAI 6-CIRCLES DIAGRAM ---

    const IkigaiDiagram = () => {
      const domains = [
        { num: '01', title: 'Foundation Architects', sub: 'Purpose, Vision, Mission, Values' },
        { num: '02', title: 'Strategy Designers', sub: 'Blueprints, Growth Plans, Sales' },
        { num: '03', title: 'Structure Builders', sub: 'Org Design, Systems & Frameworks' },
        { num: '04', title: 'Process Engineers', sub: 'Operations, Finance, Marketing' },
        { num: '05', title: 'People Enablers', sub: 'Mindset, Accountability, OKRs' },
        { num: '06', title: 'Performance Monitors', sub: 'MIS, Dashboards, Analysis' }
      ];

      return (
        <div className="w-full">
          {/* Desktop/Tablet - 6 Overlapping Circles Orbiting Center */}
          <div className="hidden md:block relative w-full max-w-[750px] aspect-square mx-auto my-16 lg:my-24">
            
            {/* Orbiting Circles */}
            {domains.map((domain, i) => {
              // 6 circles placed perfectly at 60 degree intervals
              const angle = (i * 60 - 90) * (Math.PI / 180);
              // Calculated radius ensures slight overlap with center without hiding text
              const radius = 32; 
              const top = `calc(50% + ${Math.sin(angle) * radius}%)`;
              const left = `calc(50% + ${Math.cos(angle) * radius}%)`;

              return (
                <motion.div
                  key={domain.num}
                  className="absolute w-[36%] h-[36%] bg-white rounded-full flex flex-col items-center justify-center text-center p-4 z-10 border border-gray-100 shadow-[0_0_30px_rgba(0,0,0,0.06)] hover:shadow-[0_0_40px_rgba(0,0,0,0.12)] hover:scale-105 transition-all duration-300 -translate-x-1/2 -translate-y-1/2 cursor-default"
                  style={{ top, left }}
                  initial={{ opacity: 0, scale: 0 }}
                  whileInView={{ opacity: 1, scale: 1 }}
                  viewport={{ once: true }}
                  transition={{ delay: i * 0.1 + 0.2, type: "spring", damping: 15 }}
                >
                  <span className="text-[9px] text-gray-400 font-mono mb-1.5 uppercase tracking-widest">Circle {domain.num}</span>
                  <span className="font-serif text-[18px] lg:text-[22px] leading-tight mb-1.5 text-black px-2">{domain.title}</span>
                  <span className="text-[10px] lg:text-[11px] text-gray-500 leading-relaxed max-w-[85%]">{domain.sub}</span>
                </motion.div>
              );
            })}

            {/* Center Circle */}
            <motion.div 
              className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[36%] h-[36%] bg-black text-white rounded-full flex flex-col items-center justify-center z-50 shadow-[0_20px_50px_rgba(0,0,0,0.4)] border-[8px] border-white"
              initial={{ scale: 0 }}
              whileInView={{ scale: 1 }}
              viewport={{ once: true }}
              transition={{ delay: 0.8, type: "spring", damping: 20 }}
            >
              <div className="font-mono text-[9px] tracking-[0.2em] text-gray-400 uppercase mb-2">At The Centre</div>
              <div className="font-serif text-[28px] lg:text-[36px] text-white mb-2 tracking-tight">CA Manan Vasa</div>
              <div className="font-mono text-[9px] tracking-[0.15em] text-[#C8000A] uppercase text-center px-4 font-semibold">Business Transformation Architect</div>
            </motion.div>

          </div>

          {/* Mobile - Stacked Cards */}
          <div className="md:hidden flex flex-col items-center gap-6 mt-16 mb-10">
            <motion.div 
              className="w-64 h-64 bg-black text-white rounded-full flex flex-col items-center justify-center z-30 shadow-2xl border-[6px] border-white relative"
              initial={{ scale: 0 }}
              whileInView={{ scale: 1 }}
              viewport={{ once: true }}
            >
              <div className="font-mono text-[9px] tracking-[0.2em] text-gray-400 uppercase mb-2">At The Centre</div>
              <div className="font-serif text-[28px] text-white mb-2">CA Manan Vasa</div>
              <div className="font-mono text-[9px] tracking-[0.15em] text-[#C8000A] uppercase text-center px-4 font-semibold">Business Transformation Architect</div>
            </motion.div>
            
            <div className="grid grid-cols-2 gap-4 w-full mt-4">
              {domains.map((domain, i) => (
                <motion.div
                  key={domain.num}
                  className="bg-white rounded-3xl flex flex-col items-center justify-center text-center p-6 border border-gray-100 shadow-sm"
                  initial={{ opacity: 0, y: 20 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true }}
                  transition={{ delay: i * 0.1 }}
                >
                  <span className="text-[9px] text-[#C8000A] font-mono mb-2 uppercase tracking-widest">C - {domain.num}</span>
                  <span className="font-serif text-[16px] leading-tight text-black mb-2">{domain.title}</span>
                  <span className="text-[10px] text-gray-500 leading-relaxed">{domain.sub}</span>
                </motion.div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN APPLICATION ---

    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [activeFaq, setActiveFaq] = useState(null);
      const { scrollYProgress } = useScroll();
      const scaleX = useTransform(scrollYProgress, [0, 1], [0, 1]);

      useEffect(() => {
